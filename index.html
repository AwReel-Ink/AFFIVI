<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0f1419">
<title>AffiVi</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Écran de conduite -->
    <section id="screen-drive" class="screen active">
      <header class="topbar">
        <button id="profile-badge" class="badge-btn" aria-label="Changer de véhicule">
          <span class="badge-label">🚗</span>
          <span id="profile-name-display">Standard</span>
        </button>
        <div id="gps-indicator" class="gps-indicator" title="Signal GPS">
          <span class="gps-dot"></span>
          <span class="gps-text">GPS</span>
        </div>
        <button id="open-settings" class="icon-btn" aria-label="Réglages">⚙️</button>
      </header>

      <main class="drive-main">
        <div class="speed-wrap">
          <div id="speed-value" class="speed-value">0</div>
          <div id="speed-unit" class="speed-unit">km/h</div>
        </div>

        <div class="legal-bar-wrap">
          <div id="legal-bar" class="legal-bar"><div id="legal-cursor" class="legal-cursor"></div></div>
          <div class="legal-info">
            <span id="country-flag">🇫🇷</span>
            <span>Limite : <strong id="current-limit">—</strong> km/h</span>
          </div>
        </div>

        <div class="road-selector">
          <button class="road-btn" data-road="auto">Auto</button>
          <button class="road-btn" data-road="city">🏙️ Ville</button>
          <button class="road-btn" data-road="road">🛣️ Route</button>
          <button class="road-btn" data-road="expressway">🚗 V.rapide</button>
          <button class="road-btn" data-road="highway">🛤️ Autoroute</button>
        </div>

        <div id="safety-indicator" class="safety-indicator hidden">− 0 km/h</div>
      </main>
    </section>

    <!-- Overlay générique pour les autres écrans -->
    <section id="overlay-screen" class="overlay hidden"></section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
